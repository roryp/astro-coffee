name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify the site (paced for demo)
        run: |
          test -f index.html
          echo "starting"
          sleep 120
          echo "ok"

  lint:
    # Non-required check. Only lint styles.css when that file is part of
    # the pull request, so unrelated PRs don't fail on typos already on
    # the base branch.
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: CSS property check
        run: |
          merge_base=$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          if ! git diff --name-only "$merge_base" "${{ github.event.pull_request.head.sha }}" -- styles.css | grep -q '^styles\.css$'; then
            echo "styles.css not changed in this PR - skipping lint"
            exit 0
          fi
          if [ ! -f styles.css ]; then
            echo "no styles.css on this branch - skipping lint"
            exit 0
          fi
          if grep -nE '\bcolur\s*:|\bbacground\s*:|\bbordr\s*:' styles.css; then
            echo "::error file=styles.css::CSS property typo detected (did you mean color/background/border?)"
            exit 1
          fi
          echo "ok"
